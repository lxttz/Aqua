- title: 南美白对虾高效养殖模式研究
  status: completed
  category: 水产养殖
  period: 2019 - 2022
  description: 本项目针对南美白对虾养殖中的关键问题，研究了高效、环保的养殖模式，包括池塘生态调控、饲料优化和病害防控技术。通过实验验证，该模式可提高养殖效率30%，减少病害发生率25%。
  tags:
    - 南美白对虾
    - 养殖模式
    - 生态调控
  publications:
    - title: 南美白对虾高效养殖模式的研究与应用
      link: #

